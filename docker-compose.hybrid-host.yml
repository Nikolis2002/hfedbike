services:
  nodeX:
    image: federated-node
    container_name: nodeX
    environment:
    - NEIGHBORHOOD=docker
    - NODE_ID=X
    networks:
      my_macvlan:
        ipv4_address: 192.168.1.199
    volumes:
    - /home/red_panda/Desktop/diplwmatikh/data/2024:/data/2024_csvs:z,rw
    - /home/red_panda/Desktop/diplwmatikh/federated/p2p_node/models:/models:z,rw
    - ./logs/nodeX:/logs:z,rw
    - ./federated/p2p_node:/app:z,rw
    - /home/red_panda/Desktop/diplwmatikh/results/current:/results/node_results:z,rw
    command:
    - sh
    - -lc
    - python -u /app/$NODE_SCRIPT
